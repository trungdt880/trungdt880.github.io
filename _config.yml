description: |+
  1st-year PhD student at UW-Madison, advised by Prof. Yong Jae Lee. I work on vision-language-action (VLA) models and world models, with the broader goal of teaching machines to perceive, simulate, and act. Previously I was a Staff Machine Learning Engineer at Qualcomm AI Research (efficient generative & multimodal models for edge) and a Research Resident at VinAI Research (advised by Dr. Anh Tran and Dr. Cuong Pham), where I focused on diffusion distillation and GANs.

